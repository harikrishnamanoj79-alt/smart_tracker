{% extends 'base_auth.html' %}

{% block title %}Login - SmartExpenseManager{% endblock %}

{% block content %}
<div class="text-center mb-4">
    <h2 class="fw-bold text-dark"><i class="bi bi-wallet2 text-primary me-2"></i>SmartExpense</h2>
    <p class="text-muted">Sign in to your account</p>
</div>

<form method="post">
    {% csrf_token %}
    <div class="mb-3">
        <label for="id_username" class="form-label fw-medium">Username</label>
        <div class="input-group">
            <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
            <input type="text" name="username" autofocus maxlength="150" class="form-control border-start-0 bg-light" required id="id_username" placeholder="Enter Username">
        </div>
    </div>
    <div class="mb-4">
        <label for="id_password" class="form-label fw-medium">Password</label>
        <div class="input-group">
            <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
            <input type="password" name="password" class="form-control border-start-0 bg-light" required id="id_password" placeholder="Enter Password">
        </div>
    </div>
    <button type="submit" class="btn btn-primary w-100 py-2 mb-3">Sign In</button>
</form>

<div class="text-center mt-3">
    <span class="text-muted small">Don't have an account?</span>
    <a href="{% url 'accounts:register' %}" class="text-primary small fw-semibold text-decoration-none">Sign Up</a>
</div>
{% endblock %}
