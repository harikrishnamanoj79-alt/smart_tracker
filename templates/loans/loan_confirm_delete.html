{% extends 'base.html' %}

{% block title %}Delete Loan - SmartExpenseManager{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card stat-card p-4 text-center">
            <i class="bi bi-exclamation-triangle text-danger fs-1 mb-3"></i>
            <h4 class="fw-bold text-secondary mb-3">Delete Loan</h4>
            <p class="text-muted mb-4">Are you sure you want to delete loan <strong>{{ object.loan_name }}</strong>? This action cannot be undone.</p>
            <form method="post">
                {% csrf_token %}
                <div class="d-flex justify-content-center gap-2">
                    <button type="submit" class="btn btn-danger px-4">Delete</button>
                    <a href="{% url 'loans:loan_list' %}" class="btn btn-light border px-4">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
